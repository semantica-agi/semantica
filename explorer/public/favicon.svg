<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- App icon background -->
  <rect width="64" height="64" rx="14" fill="white"/>

  <!-- Brain outline (two-lobe, front view) -->
  <path d="
    M 32,7
    C 26,7 18,11 14,17
    C 10,23 8,30 10,37
    C 12,44 17,50 23,52
    C 25,58 28,63 32,63
    C 36,63 39,58 41,52
    C 47,50 52,44 54,37
    C 56,30 54,23 50,17
    C 46,11 38,7 32,7 Z
  " fill="none" stroke="#1A5B6A" stroke-width="2"/>

  <!-- Central sulcus -->
  <path d="M 32,7 C 33,22 32,45 32,63" fill="none" stroke="#1A5B6A" stroke-width="1.5" opacity="0.5"/>

  <!-- Left hemisphere fold -->
  <path d="M 10,26 C 14,24 18,24 20,27" fill="none" stroke="#1A5B6A" stroke-width="1" opacity="0.5"/>

  <!-- Right hemisphere fold -->
  <path d="M 54,26 C 50,24 46,24 44,27" fill="none" stroke="#1A5B6A" stroke-width="1" opacity="0.5"/>

  <!-- Neural network edges -->
  <g stroke="#2AABCC" stroke-width="1.3">
    <line x1="19" y1="17" x2="32" y2="27"/>
    <line x1="45" y1="17" x2="32" y2="27"/>
    <line x1="10" y1="33" x2="32" y2="27"/>
    <line x1="54" y1="33" x2="32" y2="27"/>
    <line x1="18" y1="46" x2="32" y2="27"/>
    <line x1="46" y1="46" x2="32" y2="27"/>
    <line x1="19" y1="17" x2="45" y2="17"/>
    <line x1="10" y1="33" x2="18" y2="46"/>
    <line x1="54" y1="33" x2="46" y2="46"/>
  </g>

  <!-- Neural nodes -->
  <circle cx="19" cy="17" r="3.5" fill="#F5A623" stroke="white" stroke-width="1"/>
  <circle cx="45" cy="17" r="3.5" fill="#2AABCC" stroke="white" stroke-width="1"/>
  <circle cx="10" cy="33" r="3.5" fill="#2AABCC" stroke="white" stroke-width="1"/>
  <circle cx="32" cy="27" r="4.5" fill="#2AABCC" stroke="white" stroke-width="1.5"/>
  <circle cx="54" cy="33" r="3.5" fill="#2AABCC" stroke="white" stroke-width="1"/>
  <circle cx="18" cy="46" r="3.5" fill="#2AABCC" stroke="white" stroke-width="1"/>
  <circle cx="46" cy="46" r="3.5" fill="#F5A623" stroke="white" stroke-width="1"/>
</svg>
